trigger_scan:
  name: Trigger active host scan
  description: >
    Immediately run a full active network scan (ping + port scan) for all known
    and observed IPs, without waiting for the next scheduled interval. The
    updated results are available in the dashboard within seconds of completion.

blacklist_refresh:
  name: Force refresh threat intel blocklists
  description: >
    Immediately clear all loaded threat-intel entries and re-download every
    configured blocklist URL. Useful after adding or changing URLs in the
    integration options, or when you need up-to-date intel without waiting
    for the next scheduled refresh.

nvd_refresh:
  name: Refresh NVD vulnerability database
  description: >
    Flush the local NVD CVE cache and re-fetch fresh vulnerability data from the
    National Vulnerability Database on the next scan snapshot. Useful after
    adding an API key or when you need up-to-date CVE coverage immediately,
    without waiting for the configured cache TTL to expire.

start_baseline_training:
  name: Start baseline training
  description: >
    Start baseline training mode and learn a normal activity profile for the
    configured training duration.

stop_baseline_training:
  name: Stop baseline training
  description: >
    Stop baseline training mode immediately and promote the learned state to the
    active baseline if any hosts were observed.

clear_baseline:
  name: Clear baseline
  description: >
    Remove the current baseline state and training progress from persistent
    storage.

retrain_baseline:
  name: Retrain baseline
  description: >
    Clear the current baseline state and immediately restart training mode.
